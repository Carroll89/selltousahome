services:
  - type: web
    name: selltousahome
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_GHL_WEBHOOK_URL
        sync: false
      - key: NEXT_PUBLIC_PHONE
        sync: false
      - key: NEXT_PUBLIC_GA4_ID
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        value: https://selltousahome.com
    plan: starter
